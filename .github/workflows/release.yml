name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $TAG"

      - name: Determine version bump
        id: bump
        run: |
          LATEST="${{ steps.latest_tag.outputs.tag }}"
          # Get commits since last tag
          if [ "$LATEST" = "v0.0.0" ]; then
            COMMITS=$(git log --oneline --format="%s")
          else
            COMMITS=$(git log "${LATEST}..HEAD" --oneline --format="%s")
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Commits since $LATEST:"
          echo "$COMMITS"

          # Check for breaking changes
          if echo "$COMMITS" | grep -qE '^(feat|fix|refactor|chore|docs|test)!:|BREAKING CHANGE'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE '^fix(\(.+\))?:'; then
            BUMP="patch"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Parse current version
          VERSION="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP → $NEW_TAG"

      - name: Generate changelog
        id: changelog
        if: steps.bump.outputs.skip != 'true'
        run: |
          LATEST="${{ steps.latest_tag.outputs.tag }}"
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"

          {
            echo "changelog<<CHANGELOG_EOF"

            if [ "$LATEST" = "v0.0.0" ]; then
              RANGE="HEAD"
            else
              RANGE="${LATEST}..HEAD"
            fi

            # Features
            FEATS=$(git log "$RANGE" --oneline --format="%s" | grep -E '^feat(\(.+\))?:' | sed 's/^feat\(.*\): /- /' || true)
            if [ -n "$FEATS" ]; then
              echo "### Features"
              echo "$FEATS"
              echo ""
            fi

            # Fixes
            FIXES=$(git log "$RANGE" --oneline --format="%s" | grep -E '^fix(\(.+\))?:' | sed 's/^fix\(.*\): /- /' || true)
            if [ -n "$FIXES" ]; then
              echo "### Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Other notable changes
            OTHER=$(git log "$RANGE" --oneline --format="%s" | grep -vE '^(feat|fix)(\(.+\))?:' | sed 's/^/- /' || true)
            if [ -n "$OTHER" ]; then
              echo "### Other"
              echo "$OTHER"
              echo ""
            fi

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          CHANGELOG="${{ steps.changelog.outputs.changelog }}"

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          gh release create "$NEW_TAG" \
            --title "$NEW_TAG" \
            --notes "$CHANGELOG" \
            --latest
